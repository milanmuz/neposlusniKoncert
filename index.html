<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Bytebeat Glitch Jam (LIVE PANEL)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #141419;
            --accent-color: #00ff66;
            --text-color: #e0e0e6;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            height: calc(100vh - 40px);
        }
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }
        .visuals-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            background: var(--panel-color);
            padding: 15px;
            border: 2px solid #333;
            min-height: 0;
        }
        .glitch-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        canvas {
            width: 100%;
            flex: 1;
            background: #000;
            border: 2px solid var(--accent-color);
            object-fit: contain;
        }
        .raw-webcam-box {
            position: fixed;
            bottom: 35px;
            left: 35px;
            width: 160px;
            height: 120px;
            border: 2px solid #444;
            background: #000;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            background: var(--panel-color);
            padding: 15px;
            border: 2px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .chat-panel {
            background: var(--panel-color);
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message-card {
            background: #1c1c24;
            padding: 10px;
            border-left: 4px solid var(--accent-color);
        }
        .message-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .formula-display {
            background: #000;
            padding: 8px;
            color: var(--accent-color);
            font-size: 14px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .chat-input-area {
            padding: 15px;
            border-top: 2px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        textarea {
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            resize: none;
        }
        button {
            background: #222;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: var(--accent-color);
            color: #000;
        }
        button.recording {
            background: #ff3333;
            color: #fff;
            border-color: #ff3333;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .user-tag {
            color: #00e1ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="raw-webcam-box">
        <video id="webcam" autoplay muted playsinline></video>
    </div>

    <div class="main-panel">
        <div class="visuals-container">
            <div class="glitch-wrapper">
                <div style="margin-bottom: 5px; font-weight: bold;">👾 Live Shared Video Mix</div>
                <canvas id="glitchCanvas"></canvas>
            </div>
        </div>

        <div class="controls">
            <button id="startAudioBtn">🔊 Start Audio Engine</button>
            <button id="webcamBtn">📹 Toggle Camera</button>
            <button id="recordBtn">🔴 Record Audio & Video</button>
            <span id="status" style="color: #666; margin-left: auto;">Connecting securely to shared room node...</span>
        </div>
    </div>

    <div class="chat-panel">
        <div style="padding: 15px; border-bottom: 2px solid #333; font-weight: bold;">💬 Bytebeat Chat & Jam Feed (Live)</div>
        <div class="chat-history" id="chatHistory"></div>
        <div class="chat-input-area">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="usernameInput" placeholder="Your Username" value="Jammer" style="background:#000; color:#fff; border:1px solid #444; padding:5px; width:120px;">
                <span style="align-self: center; color: #666;">Formula (use 't'):</span>
            </div>
            <textarea id="formulaInput" rows="3" placeholder="((t >> 12) | (t >> 8)) & (t >> 4)"></textarea>
            <div style="display: flex; gap: 10px;">
                <button id="sendBtn" style="flex: 1;">🚀 Inject to Feed & Play</button>
                <button id="remixBtn" style="background: #331144; color: #ff00ff; border-color: #ff00ff;">⚡ Quick Remix</button>
            </div>
        </div>
    </div>

    <script>
        const ROOM_TOPIC = "global/bytebeat/jam/room_main_12345"; 
        const VIDEO_TOPIC = "global/bytebeat/jam/room_main_12345/video";

        let username = "Jammer_" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('usernameInput').value = username;

        let audioCtx = null;
        let scriptNode = null;
        let t = 0; 
        let currentFormulaStr = "((t >> 12) | (t >> 8)) & (t >> 4)";
        let currentFormulaFn = (t) => ((t >> 12) | (t >> 8)) & (t >> 4);
        let currentByteValue = 0;

        let videoStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        
        // Dictionary tracking remote camera feeds concurrently
        let remotePeers = {};

        const webcam = document.getElementById('webcam');
        const canvas = document.getElementById('glitchCanvas');
        const ctx = canvas.getContext('2d');
        const chatHistory = document.getElementById('chatHistory');
        const formulaInput = document.getElementById('formulaInput');
        const usernameInput = document.getElementById('usernameInput');

        formulaInput.value = currentFormulaStr;

        // --- Network Socket Handlers ---
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

        client.on('connect', () => {
            document.getElementById('status').innerText = "Connected! Send a formula to begin.";
            client.subscribe(ROOM_TOPIC);
            client.subscribe(VIDEO_TOPIC);
            broadcastData('formula', currentFormulaStr);
        });

        client.on('message', (topic, dataPacket) => {
            if (topic === VIDEO_TOPIC) {
                try {
                    const videoPacket = JSON.parse(dataPacket.toString());
                    const peerId = videoPacket.sender;
                    
                    if (peerId !== usernameInput.value) {
                        if (!remotePeers[peerId]) {
                            remotePeers[peerId] = { img: new Image(), lastSeen: Date.now() };
                        }
                        remotePeers[peerId].img.src = videoPacket.frame;
                        remotePeers[peerId].lastSeen = Date.now();
                    }
                } catch(e){}
                return;
            }
            try {
                const packet = JSON.parse(dataPacket.toString());
                handleIncomingPacket(packet);
            } catch (e) {}
        });

        function broadcastData(type, payload) {
            const outPacket = {
                type: type,
                payload: payload,
                sender: usernameInput.value,
                timestamp: new Date().toLocaleTimeString()
            };
            client.publish(ROOM_TOPIC, JSON.stringify(outPacket));
        }

        function broadcastLocalFrame(base64Frame) {
            if(client && client.connected) {
                const framePacket = { sender: usernameInput.value, frame: base64Frame };
                client.publish(VIDEO_TOPIC, JSON.stringify(framePacket));
            }
        }

        function handleIncomingPacket(packet) {
            if (packet.type === 'formula') {
                try {
                    const cleanFormula = packet.payload.replace(/[^0-9tT&|<>^%*+\-~/()?\s:]/g, ''); 
                    currentFormulaFn = new Function('t', `return (${cleanFormula}) & 255;`);
                    currentFormulaStr = packet.payload;
                    document.getElementById('status').innerText = `Playing: ${packet.sender}'s formula`;
                } catch(e) {}
            }

            const msgCard = document.createElement('div');
            msgCard.className = 'message-card';
            if (packet.sender === usernameInput.value) msgCard.style.borderLeftColor = '#ff00ff';
            
            msgCard.innerHTML = `
                <div class="message-header">
                    <span><span class="user-tag">${packet.sender}</span> updated the stream</span>
                    <span>${packet.timestamp}</span>
                </div>
                <div class="formula-display">${packet.payload}</div>
                <button onclick="applyRemix('${btoa(packet.payload)}')" style="font-size:10px; padding:2px 5px; margin-top:5px;">Fork/Edit This</button>
            `;
            chatHistory.appendChild(msgCard);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        window.applyRemix = function(base64Formula) {
            formulaInput.value = atob(base64Formula);
            formulaInput.focus();
        };

        // --- Bytebeat Audio Engine ---
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 }); 
            scriptNode = audioCtx.createScriptProcessor(4096, 0, 1);
            
            scriptNode.onaudioprocess = function(audioProcessingEvent) {
                const outputBuffer = audioProcessingEvent.outputBuffer;
                const channelData = outputBuffer.getChannelData(0);
                
                for (let sample = 0; sample < outputBuffer.length; sample++) {
                    try {
                        currentByteValue = currentFormulaFn(t);
                        channelData[sample] = (currentByteValue & 255) / 128.0 - 1.0;
                    } catch(e) {
                        channelData[sample] = 0; 
                    }
                    t++;
                }
            };
            scriptNode.connect(audioCtx.destination);
            document.getElementById('startAudioBtn').innerText = "🔊 Audio Engine Active";
        }

        // --- Multiplexed Video Composition Matrix ---
        let lastBroadcastTime = 0;
        const hiddenCanvas = document.createElement('canvas'); 
        const hiddenCtx = hiddenCanvas.getContext('2d');

        function drawGlitchFrame() {
            requestAnimationFrame(drawGlitchFrame);
            
            if (canvas.width !== 640) { canvas.width = 640; canvas.height = 480; }

            // Step 1: Wipe workspace with dynamic synthesis mathematical values
            ctx.fillStyle = `rgb(${(currentByteValue ^ 42) & 255}, 0, ${(currentByteValue * 2) & 255})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Collect all active image feeds (local camera + remote inputs)
            let activeFeeds = [];

            if (videoStream && webcam.videoWidth > 0) {
                activeFeeds.push({ source: webcam, type: 'video' });
                
                // Keep network broadcasting pipeline synchronized
                let now = Date.now();
                if (now - lastBroadcastTime > 150) { 
                    hiddenCanvas.width = 160; hiddenCanvas.height = 120; 
                    hiddenCtx.drawImage(webcam, 0, 0, 160, 120);
                    broadcastLocalFrame(hiddenCanvas.toDataURL('image/jpeg', 0.35)); 
                    lastBroadcastTime = now;
                }
            }

            // Prune dead connection sessions and mount live elements
            for (let peerId in remotePeers) {
                if (Date.now() - remotePeers[peerId].lastSeen < 3000) { // 3-second timeout limit
                    if (remotePeers[peerId].img.complete && remotePeers[peerId].img.naturalWidth > 0) {
                        activeFeeds.push({ source: remotePeers[peerId].img, type: 'image' });
                    }
                }
            }

            // Step 2: Layer and multiplex all feeds based on current music value
            if (activeFeeds.length > 0) {
                activeFeeds.forEach((feed, index) => {
                    ctx.save();
                    
                    // Modulate opacity dynamically matching rhythmic sequence fluctuations
                    ctx.globalAlpha = 1.0 / activeFeeds.length + (Math.sin(currentByteValue + index) * 0.2);
                    
                    // Mix modes flip natively responding directly to audio spectrum states
                    ctx.globalCompositeOperation = (currentByteValue % 2 === 0) ? 'screen' : 'difference';

                    ctx.drawImage(feed.source, 0, 0, canvas.width, canvas.height);
                    ctx.restore();
                });
            }

            // Step 3: Run the combined stream through the unified audio-driven glitch shader pass
            try {
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imgData.data;
                
                let strength = currentByteValue & 63; 
                let offset = (currentByteValue * 4) % (canvas.width * 4);

                if (strength > 3) {
                    for (let i = 0; i < data.length; i += 4) {
                        // Scanline fracturing loops
                        if (Math.floor(i / (canvas.width * 4)) % (12 + (currentByteValue % 15)) < 5) {
                            let targetIdx = (i + offset) % data.length;
                            data[i] = data[targetIdx]; 
                            data[i+1] = data[(targetIdx + 1) % data.length] ^ currentByteValue; 
                            data[i+2] = 255 - data[i+2]; 
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            } catch(e) {}
        }

        // --- Interactivity Bindings ---
        document.getElementById('startAudioBtn').addEventListener('click', () => {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        });

        document.getElementById('webcamBtn').addEventListener('click', async () => {
            if (!videoStream) {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user", width: { ideal: 480 }, height: { ideal: 360 } }, 
                        audio: false 
                    });
                    webcam.srcObject = videoStream;
                } catch (err) {
                    alert("Camera access denied or unavailable.");
                }
            } else {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
                webcam.srcObject = null;
            }
        });

        document.getElementById('sendBtn').addEventListener('click', () => {
            initAudio();
            const formula = formulaInput.value.trim();
            if(formula) broadcastData('formula', formula);
        });

        document.getElementById('remixBtn').addEventListener('click', () => {
            const quickRemixes = [" + (t>>3)", " ^ (t%11)", " * (t>>5|t>>8)", " | (t>>2)", " & (t<<1)"];
            const choice = quickRemixes[Math.floor(Math.random() * quickRemixes.length)];
            formulaInput.value = `(${formulaInput.value})${choice}`;
            initAudio();
            broadcastData('formula', formulaInput.value);
        });

        // --- Session Recorder ---
        document.getElementById('recordBtn').addEventListener('click', () => {
            if (!audioCtx || !scriptNode) {
                alert("Initialize the sound matrix platform before activating recording layers.");
                return;
            }
            const recordBtn = document.getElementById('recordBtn');

            if (!isRecording) {
                recordedChunks = [];
                const canvasStream = canvas.captureStream(30); 
                const audioDest = audioCtx.createMediaStreamDestination();
                scriptNode.connect(audioDest);
                scriptNode.connect(audioCtx.destination); 

                const combinedStream = new MediaStream();
                combinedStream.addTrack(canvasStream.getVideoTracks()[0]);
                combinedStream.addTrack(audioDest.stream.getAudioTracks()[0]);

                mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp8,opus' });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `bytebeat_mix_${Date.now()}.webm`;
                    a.click();
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "⏹️ Stop & Save Video";
                recordBtn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "🔴 Record Audio & Video";
                recordBtn.classList.remove('recording');
            }
        });

        drawGlitchFrame();
    </script>
</body>
</html>
